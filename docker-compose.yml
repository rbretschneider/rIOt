services:
  riot-server:
    build:
      context: .
      args:
        VERSION: "1.0.0"
    container_name: riot-server
    ports:
      - "7331:7331"
    environment:
      - RIOT_DB_URL=postgres://riot:riot@riot-db:5432/riot?sslmode=disable
      - RIOT_PORT=7331
      - RIOT_API_KEY=changeme
      - RIOT_RETENTION_DAYS=30
    depends_on:
      riot-db:
        condition: service_healthy
    restart: unless-stopped

  riot-db:
    image: postgres:16-alpine
    container_name: riot-db
    environment:
      - POSTGRES_USER=riot
      - POSTGRES_PASSWORD=riot
      - POSTGRES_DB=riot
    volumes:
      - riot-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U riot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  riot-data:
