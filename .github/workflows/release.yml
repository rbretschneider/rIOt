name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/riot-server

jobs:
  # Run tests before releasing
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Go tests
        run: go test -race -count=1 ./...
      - name: Go vet
        run: go vet ./...
      - name: Frontend tests
        working-directory: web
        run: npm ci && npx tsc --noEmit && npm run test:run

  # Build and publish the server Docker image to GHCR
  docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Cross-compile agent binaries and create a GitHub Release
  agent-binaries:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build agent binaries
        run: |
          VERSION=${{ steps.version.outputs.version }}
          LDFLAGS="-s -w -X main.version=${VERSION}"
          mkdir -p dist

          build() {
            local os=$1 arch=$2 arm=${3:-} suffix ext=""
            suffix="${os}-${arch}"
            [ -n "$arm" ] && suffix="${os}-armv${arm}"
            [ "$os" = "windows" ] && ext=".exe"

            echo "Building riot-agent-${suffix}${ext}"
            env GOOS="$os" GOARCH="$arch" ${arm:+GOARM="$arm"} \
              go build -ldflags "$LDFLAGS" \
              -o "dist/riot-agent-${suffix}${ext}" ./cmd/riot-agent
          }

          build linux  amd64
          build linux  386
          build linux  arm64
          build linux  arm   7
          build linux  arm   6
          build darwin amd64
          build darwin arm64
          build windows amd64

      - name: Copy install script to dist
        run: cp scripts/install.sh dist/install.sh

      - name: Generate checksums
        working-directory: dist
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/riot-agent-*
            dist/install.sh
            dist/checksums.txt
